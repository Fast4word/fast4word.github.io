<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      @keyframes pop {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      .tile-active { animation: pop 2s ease-in-out infinite; }
      .tile-inactive { opacity: 0.6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#0f172a"/>

  <!-- Grid tiles -->
  <g>
    <!-- Top-left: Active (teal) -->
    <rect x="16" y="16" width="100" height="100" rx="8" fill="#14b8a6" class="tile-active"/>

    <!-- Top-right: Inactive (gold) -->
    <rect x="140" y="16" width="100" height="100" rx="8" fill="#fbbf24" class="tile-inactive"/>

    <!-- Bottom-left: Inactive (gold) -->
    <rect x="16" y="140" width="100" height="100" rx="8" fill="#fbbf24" class="tile-inactive"/>

    <!-- Bottom-right: Active (teal) -->
    <rect x="140" y="140" width="100" height="100" rx="8" fill="#14b8a6" class="tile-active"/>
  </g>

  <!-- Subtle glow effect for active tiles -->
  <g opacity="0.3">
    <circle cx="66" cy="66" r="70" fill="none" stroke="#14b8a6" stroke-width="2"/>
    <circle cx="190" cy="190" r="70" fill="none" stroke="#14b8a6" stroke-width="2"/>
  </g>
</svg>
