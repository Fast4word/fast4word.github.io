<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FlipCraft — Daily Tile Puzzle</title>
    <meta name="description" content="Tap, flip, and solve daily tile puzzles with fresh mechanics every day!" />
    <meta name="author" content="FlipCraft" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlipCraft" />

    <!-- CrazyGames SDK. async + onerror so a blocked/failed load never
         prevents the game from rendering. -->
    <script async src="https://sdk.crazygames.com/crazygames-sdk-v3.js" onerror="window.__bridgeFailed=true"></script>

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="FlipCraft — Daily Tile Puzzle" />
    <meta property="og:description" content="Tap, flip, and solve daily tile puzzles with fresh mechanics every day!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <script type="module" crossorigin src="./assets/index-CIKxx6QL.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D0sBiPoe.css">
  </head>

  <body>
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('Service Worker registered');
            })
            .catch((error) => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
      function reloadOncePerSession() {
 
    const hasReloaded = sessionStorage.getItem('page_reloaded_this_session');

    if (!hasReloaded) {
      
        sessionStorage.setItem('page_reloaded_this_session', 'true');
        
        location.reload();
    } else {
        console.log("Page already refreshed for this tab session. No more reloads.");
    }
}


reloadOncePerSession();

    </script>
  </body>
</html>
