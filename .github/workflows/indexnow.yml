name: IndexNow Submission

on:
  push:
    branches: ["main"]

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Submit URLs to IndexNow
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: "https://fast4word.github.io/sitemap.xml"
          key: ${{ secrets.INDEXNOW_KEY }}
          key-location: "https://fast4word.github.io/e35e81129843452c977be55750e60966.txt"
