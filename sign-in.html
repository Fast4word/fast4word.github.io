<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In with Playgama</title>
    <!-- Load the official Playgama Bridge SDK from CDN -->
    <script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .login-btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #ff4500; border: none; color: white; border-radius: 5px; font-weight: bold; }
        .login-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <button id="signInBtn" class="login-btn" disabled>Loading SDK...</button>

    <script>
        const btn = document.getElementById('signInBtn');

        // 1. Initialize the SDK immediately
        window.bridge.initialize()
            .then(() => {
                btn.innerText = "Sign In with Playgama";
                btn.disabled = false;
                console.log("Playgama Bridge Initialized");
            })
            .catch(err => {
                btn.innerText = "Failed to load SDK";
                console.error("Initialization error:", err);
            });

        // 2. Handle the click event
        btn.addEventListener('click', () => {
            // Trigger the official authorization popup
            window.bridge.player.authorize()
                .then(() => {
                    btn.innerText = "Signed In! Redirecting...";
                    btn.disabled = true;

                    // 3. Wait exactly a quarter of a second (250ms)
                    setTimeout(() => {
                        window.location.href = 'https://fast4word.github.io';
                    }, 250);
                })
                .catch(err => {
                    console.warn("Login cancelled or failed:", err);
                    alert("Sign-in failed. Please try again.");
                });
        });
    </script>
</body>
</html>
