<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; }
        .btn { padding: 15px 30px; font-size: 1.2rem; background: #ff4500; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <button class="btn" onclick="openLogin()">Sign In with Playgama</button>

    <script>
        function openLogin() {
            // 1. Open Playgama in a new popup (Google login won't block this)
            const loginUrl = "https://playgama.com"; 
            const popup = window.open(loginUrl, "PlaygamaLogin", "width=600,height=700");

            // 2. Start a "Poller" to watch the window
            const checkWindow = setInterval(() => {
                // If the popup is closed, we assume they finished or gave up
                if (!popup || popup.closed) {
                    clearInterval(checkWindow);
                    
                    console.log("Popup closed. Waiting 250ms...");

                    // 3. Wait exactly a quarter of a second
                    setTimeout(() => {
                        // 4. Redirect back to your GitHub page
                        window.location.href = "https://fast4word.github.io";
                    }, 250);
                }
            }, 500); // Check every half-second
        }
    </script>
</body>
</html>
