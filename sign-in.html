<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playgama Sign In</title>
    <script src="https://bridge.playgama.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f0f0f; color: white; }
        #loginBtn { padding: 16px 32px; font-size: 18px; font-weight: bold; cursor: pointer; background: #ff4500; border: none; border-radius: 8px; color: white; transition: transform 0.1s; }
        #loginBtn:active { transform: scale(0.95); }
        #loginBtn:disabled { background: #333; cursor: not-allowed; }
        #msg { position: absolute; bottom: 20%; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <button id="loginBtn" disabled>Initializing...</button>
    <div id="msg">Waiting for SDK...</div>

    <script>
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('msg');

        // Initialize Playgama Bridge
        window.bridge.initialize()
            .then(() => {
                btn.disabled = false;
                btn.innerText = "Sign In with Playgama";
                msg.innerText = "Connected to Playgama";
                console.log("Platform ID:", window.bridge.platform.id);
            })
            .catch(err => {
                msg.innerText = "Config Error: Check playgama-bridge-config.json";
                console.error("Init Error:", err);
            });

        btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.innerText = "Opening Popup...";
            
            window.bridge.player.authorize()
                .then(() => {
                    msg.innerText = "Success! Redirecting...";
                    // Wait a quarter second (250ms)
                    setTimeout(() => {
                        window.location.href = 'https://fast4word.github.io';
                    }, 250);
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.innerText = "Sign In with Playgama";
                    msg.innerText = "Sign-in failed. Check console (F12).";
                    console.error("Auth Error Details:", err);
                });
        });
    </script>
</body>
</html>
