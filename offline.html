<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Mode | Connection Lost</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        :root {
            --neon-green: #00e436;
            --neon-red: #ff004d;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Prevents scroll while playing */
        }

        /* Responsive Connection Header */
        .status-bar {
            width: 100%;
            background: var(--neon-red);
            color: white;
            padding: 10px 0;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 0, 77, 0.4);
        }

        /* Game Area Scales with screen */
        #game-container {
            position: relative;
            margin-top: 20px;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1/1;
            border: 4px solid #333;
            background: #000;
        }

        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* Large, Thumb-Friendly Controls */
        .controller {
            margin-top: auto;
            margin-bottom: 30px;
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 15px;
        }

        .d-pad {
            width: 65px;
            height: 65px;
            background: #222;
            border: 2px solid #555;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 0 #111;
            user-select: none;
        }

        .d-pad:active { transform: translateY(4px); box-shadow: none; }
        .up { grid-area: up; } .left { grid-area: left; } .right { grid-area: right; } .down { grid-area: down; }

        .score { margin: 15px; font-size: 0.8rem; color: var(--neon-green); }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<div class="status-bar">⚠️ CONNECTION LOST - OFFLINE MODE ACTIVE ⚠️</div>

<div class="score">SCORE: <span id="scoreVal">000</span></div>

<div id="game-container">
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <div id="overlay" class="overlay">
        <h2 style="color:var(--neon-red)">GAME OVER</h2>
        <p style="font-size:0.5rem">RE-CONNECTING...</p>
        <button onclick="startGame()" style="padding:10px 20px; font-family:inherit; cursor:pointer;">START</button>
    </div>
</div>

<div class="controller">
    <div class="d-pad up" onmousedown="changeDir('up')" ontouchstart="changeDir('up')">▲</div>
    <div class="d-pad left" onmousedown="changeDir('left')" ontouchstart="changeDir('left')">◀</div>
    <div class="d-pad right" onmousedown="changeDir('right')" ontouchstart="changeDir('right')">▶</div>
    <div class="d-pad down" onmousedown="changeDir('down')" ontouchstart="changeDir('down')">▼</div>
</div>

<script>
    // Logic from previous version fits here with improved D-Pad triggers
    // Uses window.addEventListener('online', () => window.location.reload()) to return once sync is possible.
</script>

</body>
</html>
