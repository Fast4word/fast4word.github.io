<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Lost in Space</title>
    <style>
        :root { --bg: #0b0e14; --text: #00ff41; --accent: #ff4141; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; height: 100vh; margin: 0; padding: 20px;
            overflow: hidden; text-align: center; touch-action: manipulation;
        }
        h1 { font-size: 1.4rem; margin-top: 20px; text-transform: uppercase; }
        p { color: #888; font-size: 0.9rem; max-width: 300px; margin-bottom: 20px; }
        
        /* Game Area */
        #game-container {
            position: relative; width: 90vw; height: 50vh;
            border: 2px solid var(--text); border-radius: 8px;
            background: #161b22; overflow: hidden;
        }
        #target {
            position: absolute; width: 50px; height: 50px;
            background: var(--accent); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 0 15px var(--accent);
        }
        .stats { margin-top: 15px; font-weight: bold; }
        .btn-retry {
            margin-top: 20px; padding: 12px 30px; 
            background: var(--text); color: var(--bg);
            border: none; border-radius: 25px; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>📡 404: Internet Nomaded</h1>
    <p>Your Wi-Fi went to "find itself." While you wait for its spiritual return, try to catch this annoying square.</p>

    <div id="game-container">
        <div id="target">🤡</div>
    </div>

    <div class="stats">SCORE: <span id="score">0</span></div>
    
    <button class="btn-retry" onclick="window.location.reload()">Check Connection</button>

    <script>
        const container = document.getElementById('game-container');
        const target = document.getElementById('target');
        const scoreEl = document.getElementById('score');
        let score = 0;

        function moveTarget() {
            const maxX = container.clientWidth - target.clientWidth;
            const maxY = container.clientHeight - target.clientHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
        }

        // Touch/Click event
        target.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents ghost clicks on mobile
            catchSquare();
        });
        target.addEventListener('mousedown', catchSquare);

        function catchSquare() {
            score++;
            scoreEl.innerText = score;
            target.style.transform = "scale(0.8)";
            setTimeout(() => {
                target.style.transform = "scale(1)";
                moveTarget();
            }, 100);
        }

        // Move target every 1.5 seconds if not caught
        setInterval(() => {
            if (Math.random() > 0.7) moveTarget(); 
        }, 1500);

        // Initial position
        moveTarget();

        // Auto-reconnect detector
        window.addEventListener('online', () => {
            document.body.innerHTML = "<h1>SHE'S ALIVE!</h1><p>Reconnecting you to civilization...</p>";
            setTimeout(() => window.location.reload(), 1500);
        });
    </script>
</body>
</html>
