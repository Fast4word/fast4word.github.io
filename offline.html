<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIFI RESPAWNING...</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        body {
            background-color: #000;
            color: #00e436;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll */
            touch-action: none;
        }

        /* The Request Banner */
        .respawn-banner {
            width: 100%;
            background: #ff004d;
            color: #fff;
            padding: 15px 0;
            text-align: center;
            font-size: 0.8rem;
            box-shadow: 0 5px 15px rgba(255, 0, 77, 0.6);
            z-index: 100;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0% { background: #ff004d; }
            50% { background: #800026; }
            100% { background: #ff004d; }
        }

        /* Fullscreen Game Container */
        #game-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            background: #000;
            border: 2px solid #333;
            image-rendering: pixelated;
        }

        .score-box {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #fff;
            z-index: 10;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .start-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px 40px;
            font-family: inherit;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="respawn-banner">⚡ WIFI RESPAWNING... ⚡</div>

<div id="game-container">
    <div class="score-box">XP: <span id="scoreVal">000</span></div>
    
    <canvas id="snakeGame" width="400" height="400"></canvas>
    
    <div id="overlay" class="overlay">
        <h1 style="color:#ff004d; font-size: 1.2rem;">NO SIGNAL</h1>
        <p style="font-size:0.5rem; margin-bottom: 20px;">INTERNET.EXE NOT FOUND</p>
        <button class="start-btn" onclick="startGame()">START MISSION</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('snakeGame');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');
    const overlay = document.getElementById('overlay');
    
    let score = 0, grid = 20, count = 0, gameActive = false;
    let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
    let apple = { x: 320, y: 320 };

    // Prevent arrow keys from scrolling the page
    window.addEventListener("keydown", function(e) {
        if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
            e.preventDefault(); // Stop default scroll behavior
        }
    }, false);

    function startGame() {
        score = 0; scoreElement.innerHTML = "000";
        snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        overlay.style.display = 'none';
        gameActive = true;
        requestAnimationFrame(loop);
    }

    function changeDir(key) {
        if (key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        else if (key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        else if (key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    }

    document.addEventListener('keydown', (e) => changeDir(e.key));

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);
        if (++count < 6) return; // Speed control
        count = 0;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        snake.x += snake.dx; snake.y += snake.dy;

        if (snake.x < 0) snake.x = canvas.width - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = canvas.height - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({x: snake.x, y: snake.y});
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        ctx.fillStyle = '#ff004d';
        ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

        ctx.fillStyle = '#00e436';
        snake.cells.forEach((cell, index) => {
            ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
            if (cell.x === apple.x && cell.y === apple.y) {
                snake.maxCells++; score += 10;
                scoreElement.innerHTML = score.toString().padStart(3, '0');
                apple.x = Math.floor(Math.random() * 20) * grid;
                apple.y = Math.floor(Math.random() * 20) * grid;
            }
            for (let i = index + 1; i < snake.cells.length; i++) {
                if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                    gameActive = false;
                    overlay.style.display = 'flex';
                }
            }
        });
    }

    window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
