<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WIFI RESPAWNING...</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            color: #00e436;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; /* Total lockdown on scrolling */
            position: fixed; /* Prevents "pull-to-refresh" on mobile */
        }

        /* Full-width Overlay Banner */
        .respawn-banner {
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: #ff004d;
            color: #fff;
            padding: 12px 0;
            text-align: center;
            font-size: clamp(0.5rem, 3vw, 0.8rem);
            box-shadow: 0 5px 20px rgba(255, 0, 77, 0.8);
            z-index: 100;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { background: #ff004d; transform: scaleY(1); }
            to { background: #800026; transform: scaleY(1.05); }
        }

        /* The Canvas fills every single pixel */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
        }

        .score-box {
            position: absolute;
            top: 60px; /* Below the banner */
            left: 20px;
            font-size: 0.7rem;
            color: #fff;
            text-shadow: 2px 2px #000;
            z-index: 50;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
        }

        .start-btn {
            background: #fff; color: #000;
            border: 4px solid #00e436;
            padding: 20px 30px;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 5px 5px 0px #888;
        }
        
        .start-btn:active { transform: translate(2px, 2px); box-shadow: none; }
    </style>
</head>
<body>

<div class="respawn-banner">⚡ SYSTEM ERROR: WIFI RESPAWNING... ⚡</div>
<div class="score-box">XP: <span id="scoreVal">000</span></div>

<canvas id="snakeGame"></canvas>

<div id="overlay" class="overlay">
    <h1 style="color:#ff004d; font-size: clamp(1rem, 8vw, 2rem);">CONNECTION LOST</h1>
    <p style="font-size: 0.5rem; margin-bottom: 30px; line-height: 2;">NO INTERNET DETECTED.<br>FEED THE SNAKE TO GENERATE WIFI.</p>
    <button class="start-btn" onclick="startGame()">START RECOVERY</button>
</div>

<script>
    const canvas = document.getElementById('snakeGame');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');
    const overlay = document.getElementById('overlay');
    
    // Force canvas to match window size exactly
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let score = 0, grid = 25, count = 0, gameActive = false;
    let snake = { x: 0, y: 0, dx: grid, dy: 0, cells: [], maxCells: 5 };
    let apple = { x: 0, y: 0 };

    // Anti-scroll logic for Arrow Keys
    window.addEventListener("keydown", (e) => {
        if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
        changeDir(e.key);
    });

    function placeApple() {
        apple.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
        apple.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
    }

    function startGame() {
        score = 0; scoreElement.innerHTML = "000";
        snake = { x: grid * 5, y: grid * 5, dx: grid, dy: 0, cells: [], maxCells: 5 };
        placeApple();
        overlay.style.display = 'none';
        gameActive = true;
        requestAnimationFrame(loop);
    }

    function changeDir(key) {
        if (key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        else if (key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        else if (key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    }

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);

        if (++count < 7) return; 
        count = 0;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        snake.x += snake.dx; snake.y += snake.dy;

        // Screen Wrap logic
        if (snake.x < 0) snake.x = canvas.width - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = canvas.height - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({x: snake.x, y: snake.y});
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        // Draw Apple (The Wifi Signal)
        ctx.fillStyle = '#ff004d';
        ctx.fillRect(apple.x, apple.y, grid-2, grid-2);

        // Draw Snake
        ctx.fillStyle = '#00e436';
        snake.cells.forEach((cell, index) => {
            ctx.fillRect(cell.x, cell.y, grid-2, grid-2);
            
            // Collision with Apple
            if (cell.x === apple.x && cell.y === apple.y) {
                snake.maxCells++; 
                score += 10;
                scoreElement.innerHTML = score.toString().padStart(3, '0');
                placeApple();
            }
            
            // Collision with Self
            for (let i = index + 1; i < snake.cells.length; i++) {
                if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                    gameActive = false;
                    overlay.style.display = 'flex';
                }
            }
        });
    }

    window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
