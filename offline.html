<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WIFI RESPAWNING...</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000; color: #00e436;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; position: fixed;
        }

        /* Large, Clear Emergency Banner */
        .respawn-banner {
            position: absolute; top: 0; left: 0; width: 100%;
            background: #ff004d; color: #fff;
            padding: 20px 0; text-align: center;
            font-size: clamp(0.8rem, 5vw, 1.5rem); /* Significantly larger text */
            box-shadow: 0 10px 30px rgba(255, 0, 77, 0.9);
            z-index: 100; animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { background: #ff004d; } to { background: #b30036; }
        }

        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }

        .score-box {
            position: absolute; top: 100px; left: 30px;
            font-size: 1.2rem; color: #fff; z-index: 50;
        }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 200; padding: 40px;
        }

        .start-btn {
            background: #00e436; color: #000; border: none;
            padding: 25px 50px; font-family: inherit;
            font-size: 1.5rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="respawn-banner">⚡ WIFI RESPAWNING... ⚡</div>
<div class="score-box">XP: <span id="scoreVal">000</span></div>

<canvas id="snakeGame"></canvas>

<div id="overlay" class="overlay">
    <h1 style="color:#ff004d; font-size: clamp(1.5rem, 10vw, 3.5rem); margin-bottom: 20px;">NO SIGNAL</h1>
    <p style="font-size: 0.8rem; margin-bottom: 40px; line-height: 1.8; text-align: center;">
        INTERNET IS DOWN.<br>EAT PIXELS TO RECHARGE.
    </p>
    <button class="start-btn" onclick="startGame()">START RECOVERY</button>
</div>

<script>
    const canvas = document.getElementById('snakeGame');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');
    const overlay = document.getElementById('overlay');
    
    // Fixed Grid Size for easier alignment
    const grid = 30; 
    let score = 0, count = 0, gameActive = false;
    let snake = { x: 0, y: 0, dx: grid, dy: 0, cells: [], maxCells: 5 };
    let apple = { x: 0, y: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Critical Fix: Snaps apple to the grid
    function placeApple() {
        const cols = Math.floor(canvas.width / grid);
        const rows = Math.floor(canvas.height / grid);
        apple.x = Math.floor(Math.random() * cols) * grid;
        apple.y = Math.floor(Math.random() * rows) * grid;
    }

    function startGame() {
        score = 0; scoreElement.innerHTML = "000";
        snake = { x: grid * 5, y: grid * 5, dx: grid, dy: 0, cells: [], maxCells: 5 };
        placeApple();
        overlay.style.display = 'none';
        gameActive = true;
        requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
        if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
        if (e.key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        else if (e.key === 'ArrowUp' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        else if (e.key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (e.key === 'ArrowDown' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    });

    function loop() {
        if (!gameActive) return;
        requestAnimationFrame(loop);

        if (++count < 7) return; 
        count = 0;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        snake.x += snake.dx; snake.y += snake.dy;

        // Screen Wrap
        if (snake.x < 0) snake.x = Math.floor(canvas.width / grid) * grid - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = Math.floor(canvas.height / grid) * grid - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({x: snake.x, y: snake.y});
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        // Draw Apple
        ctx.fillStyle = '#ff004d';
        ctx.fillRect(apple.x, apple.y, grid - 2, grid - 2);

        // Draw Snake and Collision
        ctx.fillStyle = '#00e436';
        snake.cells.forEach((cell, index) => {
            ctx.fillRect(cell.x, cell.y, grid - 2, grid - 2);
            
            // Fixed eating detection: Check for perfect overlap
            if (cell.x === apple.x && cell.y === apple.y) {
                snake.maxCells++; 
                score += 10;
                scoreElement.innerHTML = score.toString().padStart(3, '0');
                placeApple();
            }
            
            for (let i = index + 1; i < snake.cells.length; i++) {
                if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                    gameActive = false;
                    overlay.style.display = 'flex';
                }
            }
        });
    }

    window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
