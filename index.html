<style>
:root {
  --bg: #0b0f1a;
  --panel: #151a2d;
  --accent: #6cf2c2;
  --accent-glow: rgba(108, 242, 194, 0.2);
  --text: #fff;
  --muted: #9aa3c7;
  --fav: #ff5c5c;
  --border: rgba(154, 163, 199, 0.15);
}

* {
  box-sizing: border-box;
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #0b0f1a, #0e1330);
  color: var(--text);
  min-height: 100vh;
}

/* Main Header */
header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(13, 18, 37, 0.95);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
  color: var(--text);
  transition: color 0.2s;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}

.menu-btn:hover {
  color: var(--accent);
  background: var(--accent-glow);
}

header h1 {
  margin: 0;
  font-size: 1.3rem;
  font-weight: 700;
  flex: 1;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Search in Header */
.search-container {
  flex: 1;
  max-width: 500px;
  position: relative;
}

.search-container input {
  width: 100%;
  padding: 10px 14px 10px 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  font-size: 0.95rem;
  transition: all 0.3s;
}

.search-container input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--muted);
  pointer-events: none;
}

/* Game Header (shows when playing) */
#gameHeader {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: rgba(13, 18, 37, 0.98);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 101;
}

#gameHeader .back-btn {
  font-size: 24px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}

#gameHeader .back-btn:hover {
  color: var(--accent);
  background: var(--accent-glow);
}

#gameHeader .game-title {
  flex: 1;
  font-size: 1.1rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#gameHeader .game-fav-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.3s;
  color: #ccc;
}

#gameHeader .game-fav-btn:hover {
  transform: scale(1.05);
  border-color: var(--accent);
}

#gameHeader .game-fav-btn.active {
  background: linear-gradient(135deg, rgba(255, 92, 92, 0.2), rgba(255, 92, 92, 0.1));
  color: var(--fav);
  border-color: var(--fav);
  box-shadow: 0 0 20px rgba(255, 92, 92, 0.4);
}

/* Sidebar */
aside {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  width: 280px;
  background: #0d1225;
  padding: 20px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 50;
  box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
}

aside.active {
  transform: translateX(0);
}

.sidebar-header {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 24px;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  z-index: 45;
  backdrop-filter: blur(2px);
}

.backdrop.active {
  display: block;
}

.genre {
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  color: var(--muted);
  font-weight: 500;
  transition: all 0.2s;
  border: 1px solid transparent;
}

.genre.active, .genre:hover {
  background: var(--panel);
  color: var(--accent);
  border-color: var(--border);
  transform: translateX(4px);
}

/* Sections */
.section {
  padding: 20px 16px;
}

.section h2 {
  margin: 0 0 16px;
  font-size: 1.5rem;
  font-weight: 700;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 900px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

@media (min-width: 1200px) {
  .grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

/* Cards */
.card {
  background: var(--panel);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-glow);
  border-color: var(--accent);
}

.thumb {
  width: 100%;
  height: 150px;
  object-fit: cover;
  background: linear-gradient(135deg, #1a1f3a, #0d1225);
}

.card-body {
  padding: 12px;
}

.card-title {
  font-weight: 600;
  font-size: 0.95rem;
  line-height: 1.3;
}

/* Favourite */
.fav-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #ccc;
  transition: all 0.3s;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.fav-btn:hover {
  transform: scale(1.1);
}

.fav-btn.active {
  background: rgba(255, 92, 92, 0.25);
  color: var(--fav);
  box-shadow: 0 0 16px rgba(255, 92, 92, 0.6);
  transform: scale(1.15);
  border-color: var(--fav);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-state .icon {
  font-size: 80px;
  margin-bottom: 20px;
  opacity: 0.3;
}

.empty-state h3 {
  font-size: 1.4rem;
  margin: 0 0 12px;
  color: var(--text);
}

.empty-state p {
  font-size: 1rem;
  margin: 0;
  opacity: 0.8;
}

/* Game View */
#gameView {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  z-index: 100;
}

#gameView iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 70px;
  background: rgba(13, 18, 37, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 40;
}

.bottom-nav button {
  background: none;
  border: none;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 12px;
  transition: all 0.2s;
}

.bottom-nav button span {
  font-size: 24px;
  transition: transform 0.2s;
}

.bottom-nav button:hover {
  background: var(--accent-glow);
}

.bottom-nav button.active {
  color: var(--accent);
}

.bottom-nav button.active span {
  transform: scale(1.15);
}

.page {
  padding-bottom: 90px;
}

/* Playing State */
body.playing header,
body.playing .section,
body.playing .bottom-nav,
body.playing aside,
body.playing .backdrop {
  display: none;
}

body.playing #gameHeader {
  display: flex;
}

body.playing #gameView {
  padding-top: 60px;
}

body.playing #gameView iframe {
  height: calc(100% - 60px);
  margin-top: 60px;
}

/* Adblock overlay */
#adblockOverlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #0b0f1a, #151a2d);
  color: #fff;
  display: none;
  z-index: 1000;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

#adblockOverlay h2 {
  font-size: 1.8rem;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--fav), #ff8a5c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#adblockOverlay button {
  margin-top: 24px;
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #4ec9a0);
  color: #000;
  font-weight: 600;
  cursor: pointer;
  font-size: 1rem;
  transition: transform 0.2s;
}

#adblockOverlay button:hover {
  transform: scale(1.05);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  animation: fadeIn 0.4s ease;
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="menu-btn" onclick="openMenu()">☰</div>
    <h1>Dunah PlayZone</h1>
    <div class="search-container">
      <div class="search-icon">🔍</div>
      <input id="search" placeholder="Search games..." oninput="render()">
    </div>
  </div>
</header>

<!-- Game Header (appears when playing) -->
<div id="gameHeader">
  <div class="back-btn" onclick="closeGame()">←</div>
  <div class="game-title" id="gameTitle">Game Title</div>
  <div class="game-fav-btn" id="gameFavBtn" onclick="toggleCurrentGameFavourite()">🤍</div>
</div>



<aside id="sidebar">
  <div class="sidebar-header">Categories</div>
  <div class="genre active" id="filterAll">All Games</div>
  <div class="genre" id="filterFav">⭐ Favourites</div>
  <div id="genreList"></div>
</aside>

<div id="homeTab" class="page">
  <div class="section">
    <h2>Featured</h2>
    <div class="grid" id="featuredGrid"></div>
  </div>
  <div class="section">
    <h2>Recommended</h2>
    <div class="grid" id="recommendedGrid"></div>
  </div>
</div>

<div id="gamesTab" class="page" style="display:none">
  <div class="section">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="gameView">
  <iframe id="gameFrame" allow="autoplay; payment; fullscreen"></iframe>
</div>

<div class="bottom-nav">
  <button onclick="setTab('games')"><span>🎮</span>Games</button>
  <button class="active" onclick="setTab('home')"><span>🏠</span>Home</button>
  <button onclick="setTab('fav')"><span>❤️</span>Favourites</button>
</div>

<!-- Adblock overlay -->
<div id="adblockOverlay">
  <div>
    <h2>Ad Blocker Detected</h2>
    <p style="color:#9aa3c7">
      Dunah PlayZone is free thanks to ads.<br>
      Please disable your ad blocker to play games.
    </p>
    <button onclick="location.reload()">
      I Disabled My Ad Blocker
    </button>
  </div>
</div>

<!-- Adblock bait -->
<div class="adsbox" style="height:1px;width:1px;position:absolute;left:-9999px"></div>

<script>
history.replaceState(null, "");

const featuredGrid = document.getElementById("featuredGrid");
const recommendedGrid = document.getElementById("recommendedGrid");
const grid = document.getElementById("grid");
const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("backdrop");
const genreList = document.getElementById("genreList");
const search = document.getElementById("search");
const gameView = document.getElementById("gameView");
const gameFrame = document.getElementById("gameFrame");
const gameHeader = document.getElementById("gameHeader");
const gameTitle = document.getElementById("gameTitle");
const gameFavBtn = document.getElementById("gameFavBtn");
const adblockOverlay = document.getElementById("adblockOverlay");

let games = [];
let favourites = JSON.parse(localStorage.getItem("favourites") || "[]");
let genrePlays = JSON.parse(localStorage.getItem("genrePlays") || "{}");
let allowedGenres = [];
let tab = "home";
let activeGenre = "all";
let adBlocked = false;
let currentGame = null;

/* Adblock detect */
function detectAdBlock() {
  const bait = document.querySelector(".adsbox");
  if (!bait || bait.offsetHeight === 0) {
    adBlocked = true;
  }
}
window.addEventListener("load", () => setTimeout(detectAdBlock, 300));

/* UI */
function openMenu() { 
  sidebar.classList.add("active"); 
  backdrop.classList.add("active"); 
}

function closeMenu() { 
  sidebar.classList.remove("active"); 
  backdrop.classList.remove("active"); 
}

/* Tabs */
function setTab(t) {
  tab = t;
  document.querySelectorAll(".bottom-nav button").forEach(b => b.classList.remove("active"));
  document.querySelector(`.bottom-nav button:nth-child(${t === "games" ? 1 : t === "home" ? 2 : 3})`).classList.add("active");
  homeTab.style.display = t === "home" ? "block" : "none";
  gamesTab.style.display = t === "home" ? "none" : "block";
  render();
}

/* Load games */
fetch("games.json").then(r => r.json()).then(data => {
  let raw = [];
  if (Array.isArray(data.hits)) raw = data.hits;
  else if (Array.isArray(data.segments))
    raw = data.segments.flatMap(s => s.hits || []);
  games = Object.values(Object.fromEntries(raw.map(g => [g.id, g])));

  games.unshift({
    id: "ball-burst",
    title: "Ball Burst",
    images: ["https://img.gamepix.com/games/ball-burst/icon/ball-burst.png?w=105"],
    genres: ["arcade", "mobile", "puzzle", "skill"],
    gameURL: "https://play.gamepix.com/ball-burst/embed?sid=1"
  });

  buildGenres();
  render();
});

/* Genres (top 10) */
function buildGenres() {
  const c = {};
  games.forEach(g => (g.genres || []).forEach(x => {
    // Count all genres, excluding curated and internal ones
    if (!x.includes("curated") && !x.includes("_")) {
      c[x] = (c[x] || 0) + 1;
    }
  }));
  
  // Get top 10 most popular genres
  allowedGenres = Object.entries(c)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(x => x[0]);

  console.log("Top genres:", allowedGenres); // Debug log
  
  genreList.innerHTML = "";
  
  // Add genre divider
  const divider = document.createElement("div");
  divider.style.cssText = "height: 1px; background: rgba(154, 163, 199, 0.15); margin: 12px 0;";
  genreList.appendChild(divider);
  
  const genreHeader = document.createElement("div");
  genreHeader.style.cssText = "font-size: 0.75rem; color: var(--muted); padding: 8px 16px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;";
  genreHeader.textContent = "Genres";
  genreList.appendChild(genreHeader);
  
  // Add each genre
  allowedGenres.forEach(slug => {
    const d = document.createElement("div");
    d.className = "genre";
    d.textContent = slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    d.onclick = () => { activeGenre = slug; setTab("games"); closeMenu(); };
    genreList.appendChild(d);
  });

  filterAll.onclick = () => { activeGenre = "all"; setTab("games"); closeMenu(); };
  filterFav.onclick = () => { activeGenre = "favourites"; setTab("fav"); closeMenu(); };
}

/* Featured */
function getFeatured() {
  const week = Math.floor(Date.now() / 604800000);
  const bb = games.find(g => g.id === "ball-burst");
  const others = games.filter(g => g.id !== "ball-burst");
  return [bb, others[week % others.length], others[(week + 3) % others.length]].filter(Boolean);
}

/* Recommended */
function getRecommended() {
  const favGenres = Object.entries(genrePlays)
    .filter(([g]) => allowedGenres.includes(g))
    .sort((a, b) => b[1] - a[1])
    .slice(0, 2)
    .map(x => x[0]);

  let rec = games.filter(g => g.genres?.some(gen => favGenres.includes(gen)));
  if (rec.length < 6) rec = rec.concat(games.filter(g => !rec.includes(g)));
  return rec.slice(0, 6);
}

/* Render */
function renderCards(list, el) {
  if (list.length === 0) {
    el.innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <div class="icon">🎮</div>
        <h3>No games found</h3>
        <p>Try adjusting your search or browse other categories</p>
      </div>`;
    return;
  }

  el.innerHTML = "";
  list.forEach(g => {
    const fav = favourites.includes(g.id);
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="fav-btn ${fav ? "active" : ""}"
        onclick="event.stopPropagation(); toggleFavourite('${g.id}')">
        ${fav ? "❤️" : "🤍"}
      </div>
      <img class="thumb" src="${g.images?.[0] || ""}" alt="${g.title}">
      <div class="card-body"><div class="card-title">${g.title}</div></div>`;
    c.onclick = () => openGame(g);
    el.appendChild(c);
  });
}

function render() {
  const q = search.value.toLowerCase();
  if (tab === "home") {
    renderCards(getFeatured(), featuredGrid);
    const recommended = getRecommended().filter(g => g.title.toLowerCase().includes(q));
    renderCards(recommended, recommendedGrid);
  } else {
    let list = games.filter(g => g.title.toLowerCase().includes(q));
    if (tab === "fav") {
      list = list.filter(g => favourites.includes(g.id));
      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="icon">❤️</div>
            <h3>No favourites yet</h3>
            <p>Tap the heart on any game to add it to your favourites</p>
          </div>`;
        return;
      }
    }
    if (activeGenre !== "all" && activeGenre !== "favourites")
      list = list.filter(g => g.genres?.includes(activeGenre));
    renderCards(list, grid);
  }
}

/* Favourites */
function toggleFavourite(id) {
  favourites = favourites.includes(id)
    ? favourites.filter(x => x !== id)
    : [...favourites, id];
  localStorage.setItem("favourites", JSON.stringify(favourites));
  
  // Update game header if this is the current game
  if (currentGame && currentGame.id === id) {
    updateGameHeader();
  }
  
  render();
}

function toggleCurrentGameFavourite() {
  if (currentGame) {
    toggleFavourite(currentGame.id);
  }
}

function updateGameHeader() {
  if (currentGame) {
    gameTitle.textContent = currentGame.title;
    const isFav = favourites.includes(currentGame.id);
    gameFavBtn.innerHTML = isFav ? "❤️" : "🤍";
    gameFavBtn.className = "game-fav-btn" + (isFav ? " active" : "");
  }
}

/* Game open (GATED) */
function openGame(game) {
  if (adBlocked) {
    adblockOverlay.style.display = "flex";
    return;
  }

  currentGame = game;
  
  (game.genres || []).forEach(g => {
    if (allowedGenres.includes(g))
      genrePlays[g] = (genrePlays[g] || 0) + 1;
  });
  localStorage.setItem("genrePlays", JSON.stringify(genrePlays));

  updateGameHeader();
  gameFrame.src = game.gameURL;
  gameView.style.display = "block";
  document.body.classList.add("playing");
  history.pushState(null, "");
}

function closeGame() {
  document.body.classList.remove("playing");
  gameView.style.display = "none";
  gameFrame.src = "";
  currentGame = null;
  history.back();
}

window.addEventListener("popstate", () => {
  if (document.body.classList.contains("playing")) {
    closeGame();
  }
});

search.oninput = render;
</script>

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker Registered!'))
        .catch(err => console.log('Registration Failed: ', err));
    });
  }
</script>
